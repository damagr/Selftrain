name: Release APK
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Write keystore properties
        run: |
          echo 'storeFile=release.jks' > keystore.properties
          echo 'storePassword=${{ secrets.KEYSTORE_PASS }}' >> keystore.properties
          echo 'keyAlias=${{ secrets.KEY_ALIAS }}' >> keystore.properties
          echo 'keyPassword=${{ secrets.KEY_PASS }}' >> keystore.properties

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
